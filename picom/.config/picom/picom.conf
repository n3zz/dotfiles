# ~/.config/picom/picom.conf
#
# Tokyo Night Storm rice — kitty translucency, subtle shadows, rules-based
# per-app animations. NVIDIA-specific: backend glx, vsync via nvidia driver's
# own sync.

backend = "glx";
vsync = true;

# ---- Shadows (global defaults; per-window overrides live in rules) ----
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.45;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-color = "#1a1b26";

# ---- Blur (global defaults; per-window overrides live in rules) ----
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;

# ---- Corners (global default; per-window overrides live in rules) ----
corner-radius = 8;
round-borders = 1;

# ---- Per-app / per-type rules ----
rules = (
    # Focus-based opacity, scoped away from windows with their own dedicated opacity below
    {
        match = "(focused || wmwin || override_redirect) && class_g != 'kitty' && class_g != 'Alacritty' && class_g != 'rofi'";
        opacity = 1.0;
    },
    {
        match = "!focused && !wmwin && !override_redirect && class_g != 'kitty' && class_g != 'Alacritty' && class_g != 'rofi'";
        opacity = 0.95;
        opacity-override = false;
    },

    # kitty
    {
        match = "class_g = 'kitty'";
        opacity = 0.92;
        animations = (
            {
                triggers = ["open"];
                scale-x = { curve = "cubic-bezier(0.34, 1.56, 0.64, 1)"; duration = 0.25; start = 0.7; end = 1; };
                scale-y = "scale-x";
                opacity = { curve = "cubic-bezier(0.34, 1.56, 0.64, 1)"; duration = 0.25; start = 0; end = "window-raw-opacity"; };
                offset-x = "(1 - scale-x) / 2 * window-width";
                offset-y = "(1 - scale-y) / 2 * window-height";
            },
            {
                triggers = ["close"];
                scale-x = { curve = "cubic-bezier(0.34, 1.56, 0.64, 1)"; duration = 0.2; start = 1; end = 0.7; };
                scale-y = "scale-x";
                opacity = { curve = "linear"; duration = 0.2; start = "window-raw-opacity-before"; end = 0; };
                offset-x = "(1 - scale-x) / 2 * window-width";
                offset-y = "(1 - scale-y) / 2 * window-height";
            }
        );
    },

    # Alacritty
    {
        match = "class_g = 'Alacritty'";
        opacity = 0.92;
    },

    # rofi
    {
        match = "class_g = 'rofi'";
        opacity = 0.95;
        shadow = false;
    },

    # polybar
    {
        match = "class_g = 'polybar'";
        shadow = false;
        blur-background = false;
        corner-radius = 0;
    },

    # i3-frame
    {
        match = "class_g = 'i3-frame'";
        corner-radius = 0;
    },

    # Window-type based rules
    {
        match = "window_type = 'dock'";
        shadow = false;
        blur-background = false;
        corner-radius = 0;
    },
    {
        match = "window_type = 'desktop'";
        blur-background = false;
    },
    {
        match = "window_type = 'tooltip'";
        shadow = false;
        opacity = 0.9;
        full-shadow = false;
    },
    {
        match = "window_type = 'dnd'";
        shadow = false;
    },
    {
        match = "window_type = 'popup_menu'";
        opacity = 0.95;
    },
    {
        match = "window_type = 'dropdown_menu'";
        opacity = 0.95;
    },

    # Dunst
    {
        match = "class_g = 'Dunst'";
        animations = (
            { triggers = ["open"]; preset = "fly-in"; direction = "right"; duration = 0.2; },
            { triggers = ["close"]; preset = "fly-out"; direction = "right"; duration = 0.2; }
        );
    },

    # Steam — fully excluded from all compositor effects
    {
        match = "class_g = 'steamwebhelper' || class_g = 'steam'";
        shadow = false;
        blur-background = false;
        corner-radius = 0;
        fade = false;
    }
);

# ---- General ----
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
log-level = "warn";
