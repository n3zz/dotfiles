# ~/.config/picom/picom.conf
#
# Tokyo Night Storm rice — kitty translucency, subtle shadows/fades
# NVIDIA-specific: backend glx, vsync via nvidia driver's own sync

backend = "glx";
vsync = true;

# ---- Shadows ----
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.45;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-color = "#1a1b26";
shadow-exclude = [
    "class_g = 'polybar'",
    "class_g = 'rofi'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ---- Fading ----
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 4;
fade-exclude = [];

# ---- Transparency / opacity ----
inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "92:class_g = 'kitty'",
    "92:class_g = 'Alacritty'",
    "95:class_g = 'rofi'"
];

# ---- Blur (subtle, behind floating/transparent windows) ----
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'polybar'"
];

# ---- Corners ----
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "class_g = 'polybar'",
    "class_g = 'i3-frame'"
];
round-borders = 1;

# ---- Window type settings ----
wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 0.9; focus = true; full-shadow = false; };
    dock = { shadow = false; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};

# ---- General ----
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
log-level = "warn";

