# Blur + dim for depth, rather than flat/sharp wallpaper
blur=0.5
dimness=0.2

# Clock styling — modern lock screens lean into a large, minimal clock
time_format="%H:%M"
date_format="%A, %d %B"
font="JetBrainsMono Nerd Font"  # match whatever you're using in kitty/polybar

# Ring/indicator colors — pull from Tokyo Night Storm palette
insidecolor=1a1b26bb
ringcolor=7aa2f7ff
ring_ver_color=9ece6aff
ring_wrong_color=f7768eff
keyhlcolor=bb9af7ff
bshlcolor=f7768eff
