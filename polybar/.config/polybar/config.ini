; ~/.config/polybar/config.ini
;
; Tokyo Night Storm — mirrors the same palette used across the whole rice

[colors]
bg0 = #1a1b26
bg1 = #16161e
bg2 = #1f2335
fg0 = #c0caf5
fg1 = #a9b1d6
comment = #565f89
border = #414868
border_focus = #7aa2f7
blue = #7aa2f7
cyan = #7dcfff
purple = #bb9af7
green = #9ece6a
yellow = #e0af68
orange = #ff9e64
red = #f7768e

[bar/main]
width = 100%
height = 34
offset-x = 0
offset-y = 10
fixed-center = true

background = ${colors.bg0}
foreground = ${colors.fg0}

line-size = 0
border-size = 0

padding-left = 1
padding-right = 1
module-margin = 1

font-0 = JetBrainsMono Nerd Font:size=11;2

modules-left = i3
modules-center = xwindow
modules-right = idle-inhibitor flameshot media-prev media-play-pause media-next mpris steam discord pulseaudio gpu-recorder network cpu memory temperature gpu battery date  tray

cursor-click = pointer


# Monitor iteratiion - DO NOT REMOVE THIS IS LINKED TO THE LAUNCHER SCRIPT
monitor = ${env:MONITOR:}


[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

label-mode-padding = 2
label-mode-foreground = ${colors.bg0}
label-mode-background = ${colors.purple}

label-focused = %index%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.bg0}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.comment}
label-unfocused-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.fg1}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.bg0}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.fg1}

[module/idle-inhibitor]
type = custom/script
exec = ~/.config/polybar/scripts/idle-inhibitor-indicator.sh
interval = 2
format-foreground = ${colors.yellow}
click-left = ~/.config/polybar/scripts/idle-inhibitor-toggle.sh

[module/media-prev]
type = custom/script
exec = printf '\uf048\n'
interval = 9999
format-foreground = ${colors.green}
click-left = playerctl previous

[module/media-play-pause]
type = custom/script
exec = playerctl status 2>/dev/null | grep -q Playing && printf '\uf04c\n' || printf '\uf04b\n'
interval = 1
click-left = playerctl play-pause
format-foreground = ${colors.green}

[module/media-next]
type = custom/script
exec = printf '\uf051\n'
interval = 9999
format-foreground = ${colors.green}
click-left = playerctl next

[module/mpris]
type = custom/script
exec = playerctl metadata --format '{{ artist }} - {{ title }}' 2>/dev/null
interval = 2
format = <label>
label = %output:0:40:...%
format-foreground = ${colors.green}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted = " muted"
label-muted-foreground = ${colors.comment}
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
click-right = pavucontrol
format-volume-foreground = ${colors.purple}

[module/network]
type = internal/network
interface-type = wired
format-connected = <label-connected>
label-connected = " %essid%"
format-disconnected = <label-disconnected>
label-disconnected = "⚠ disconnected"
format-connected-foreground = ${colors.green}
format-disconnected-foreground = ${colors.comment}

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = " %percentage%%"
format-foreground = ${colors.cyan}

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = " %percentage_used%%"
format-foreground = ${colors.blue}

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 80
format = <label>
format-warn = <label-warn>
label = " %temperature-c%"
label-warn = " %temperature-c%"
format-foreground = ${colors.yellow}
format-warn-foreground = ${colors.red}

[module/gpu]
type = custom/script
exec = nvidia-smi --query-gpu=utilization.gpu,temperature.gpu --format=csv,noheader,nounits | awk -F', ' '{print " " $1 "% " $2 "°"}'
interval = 3
format-foreground = ${colors.green}

[module/steam]
type = custom/script
exec = ~/.config/polybar/scripts/steam-indicator.sh
interval = 5
format-foreground = ${colors.blue}
click-left = steam steam://open/main

[module/gpu-recorder]
type = custom/script
exec = ~/.config/polybar/scripts/gpurecorder-indicator.sh
interval = 2
format-foreground = ${colors.red}

[module/flameshot]
type = custom/script
exec = ~/.config/polybar/scripts/flameshot-launcher.sh
interval = 9999
format-foreground = ${colors.cyan}
click-left = flameshot gui

[module/discord]
type = custom/script
format-padding = 1
exec = ~/.config/polybar/scripts/discord-indicator.sh
interval = 5
format-foreground = ${colors.blue}
click-left = discord

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 99
format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = " %percentage%%"
label-discharging = " %percentage%%"
format-charging-foreground = ${colors.green}
format-discharging-foreground = ${colors.fg1}

[module/date]
type = internal/date
interval = 1

timezone = Europe/London

date = %H:%M
date-alt = %A, %d %B %Y
label = %date%
format-background = ${colors.blue}
format-foreground = ${colors.bg0}
format-padding = 2

[module/tray]
type = internal/tray
tray-spacing = 8

[settings]
screenchange-reload = true
pseudo-transparency = false

